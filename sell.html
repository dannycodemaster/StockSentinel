<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockSentinel - Sell Dashboard</title>
  <link rel="stylesheet" href="index.css" />
  <style>
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      padding: 1.5rem;
      min-height: 100vh;
    }

    .sell-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .sell-header {
      margin-bottom: 1.5rem;
    }

    .sell-header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .sell-grid {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 1.5rem;
      align-items: start;
    }

    .sell-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-backdrop);
      -webkit-backdrop-filter: var(--glass-backdrop);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius-md);
      padding: 1.5rem;
      box-shadow: var(--shadow-lg);
    }

    .sell-card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text-primary);
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Qty circular buttons */
    .btn-qty {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all var(--transition-fast);
      user-select: none;
      flex-shrink: 0;
    }

    .btn-qty:hover {
      background-color: var(--accent-primary);
      border-color: var(--accent-primary);
      transform: scale(1.08);
    }

    .qty-display {
      display: inline-block;
      min-width: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
      margin: 0 0.35rem;
    }

    .btn-remove {
      padding: 0.25rem 0.55rem;
      font-size: 0.72rem;
      border-radius: var(--border-radius-sm);
      background-color: var(--bg-danger-soft);
      color: var(--color-danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-remove:hover {
      background-color: var(--color-danger);
      color: #fff;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.3);
    }

    .cart-summary-section {
      margin-top: 1.25rem;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }

    .grand-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 1.1rem;
      color: var(--text-primary);
    }

    .grand-total-row span:last-child {
      color: var(--color-success);
    }

    .cart-btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }

    .btn-success {
      background: linear-gradient(135deg, var(--color-success), hsl(142, 70%, 38%));
      color: #fff;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.25);
    }

    .btn-success:hover {
      background: linear-gradient(135deg, hsl(142, 70%, 38%), var(--color-success));
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }

    .cart-table-wrapper {
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius-sm);
      background-color: rgba(0, 0, 0, 0.1);
    }

    /* --- SALES HISTORY SECTION --- */
    .sales-history-section {
      margin-top: 2rem;
    }

    .sales-history-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .history-table-wrapper {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    .btn-reprint {
      padding: 0.3rem 0.7rem;
      font-size: 0.78rem;
      border-radius: var(--border-radius-sm);
      background-color: var(--bg-tertiary);
      color: var(--accent-primary);
      border: 1px solid rgba(14, 165, 233, 0.3);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-reprint:hover {
      background-color: rgba(14, 165, 233, 0.15);
      border-color: var(--accent-primary);
      box-shadow: 0 0 8px rgba(14, 165, 233, 0.2);
    }

    /* Sale finalize flash animation */
    @keyframes flashSuccess {
      0% { background-color: transparent; }
      30% { background-color: rgba(16, 185, 129, 0.15); }
      100% { background-color: transparent; }
    }

    .finalize-flash {
      animation: flashSuccess 1s ease-out;
    }

    @media (max-width: 900px) {
      .sell-grid {
        grid-template-columns: 1fr;
      }

      .cart-btn-group {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="sell-container">
    <div class="sell-header">
      <h1>🛒 Sell Dashboard</h1>
    </div>

    <!-- TOP SELL GRID: form + cart -->
    <div class="sell-grid">

      <!-- LEFT COLUMN: SALE ENTRY FORM -->
      <div class="sell-card">
        <h2>📋 Enter Sale Details</h2>
        <form id="sell-form" autocomplete="off">
          <div class="form-group">
            <label for="sell-product">Product *</label>
            <select class="form-control" id="sell-product" required></select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="sell-price">Price (₦)</label>
              <input type="text" class="form-control" id="sell-price" readonly />
            </div>
            <div class="form-group">
              <label for="sell-qty">Quantity *</label>
              <input type="number" class="form-control" id="sell-qty" min="1" value="1" required />
            </div>
          </div>
          <div class="form-group">
            <label for="sell-total">Line Total (₦)</label>
            <input type="text" class="form-control" id="sell-total" readonly />
          </div>
          <div class="form-group">
            <label for="sell-date">Date</label>
            <input type="date" class="form-control" id="sell-date" readonly />
          </div>
          <div class="form-group">
            <label for="sell-location">Location *</label>
            <select class="form-control" id="sell-location" required></select>
          </div>
          <div class="form-group">
            <label for="sell-notes">Notes</label>
            <input type="text" class="form-control" id="sell-notes" placeholder="Optional notes..." />
          </div>
          <button type="button" id="add-to-cart" class="btn btn-primary w-full mt-2">
            + Add to Cart
          </button>
        </form>
      </div>

      <!-- RIGHT COLUMN: LIVE CART + BUTTONS -->
      <div class="sell-card" id="cart-panel">
        <h2>🛍️ Cart Items</h2>
        <div class="cart-table-wrapper">
          <table class="data-table" style="margin: 0;">
            <thead>
              <tr>
                <th>Product</th>
                <th class="text-right">Price</th>
                <th class="text-center" style="width: 130px;">Qty</th>
                <th class="text-right">Subtotal</th>
                <th class="text-center" style="width: 80px;">Del</th>
              </tr>
            </thead>
            <tbody id="cart-table-body"></tbody>
          </table>
        </div>

        <div class="cart-summary-section">
          <div class="grand-total-row">
            <span>Grand Total:</span>
            <span id="grand-total-val">₦0.00</span>
          </div>
          <div class="cart-btn-group">
            <button type="button" id="finalize-sale" class="btn btn-success">✅ Finalize Sale</button>
            <button type="button" id="print-receipt-btn" class="btn btn-secondary">🖨️ Print Receipt</button>
          </div>
        </div>
      </div>
    </div>



  <script type="module">
    import { getProducts, getLocations, saveTransaction, getCurrentUser } from './db.js';

    // ─── CONSTANTS ───────────────────────────────────────────────────────────
    const SALES_HISTORY_KEY = 'stocksentinel_sales_history';

    // ─── DOM REFS ─────────────────────────────────────────────────────────────
    const productSelect   = document.getElementById('sell-product');
    const priceInput      = document.getElementById('sell-price');
    const totalInput      = document.getElementById('sell-total');
    const qtyInput        = document.getElementById('sell-qty');
    const dateInput       = document.getElementById('sell-date');
    const locationSelect  = document.getElementById('sell-location');
    const notesInput      = document.getElementById('sell-notes');
    const cartTableBody   = document.getElementById('cart-table-body');
    const grandTotalVal   = document.getElementById('grand-total-val');

    // ─── POPULATE DROPDOWNS ───────────────────────────────────────────────────
    const products = getProducts();
    const productMap = {};
    products.forEach(p => { productMap[p.ProductID] = p; });

    productSelect.innerHTML = products.map(p =>
      `<option value="${p.ProductID}">${p.SKU} – ${p.ProductName}</option>`
    ).join('');

    const locations = getLocations();
    const locationMap = {};
    locations.forEach(l => { locationMap[l.LocationID] = l.LocationName; });

    locationSelect.innerHTML = locations.map(l =>
      `<option value="${l.LocationID}">${l.LocationName}</option>`
    ).join('');

    dateInput.value = new Date().toISOString().split('T')[0];

    // ─── PRICE HELPERS ────────────────────────────────────────────────────────
    function updateProductPrices() {
      const prod = productMap[productSelect.value];
      if (prod) {
        const price = Number(prod.RetailPrice) || 0;
        priceInput.value = price.toFixed(2);
        const qty = Number(qtyInput.value) || 0;
        totalInput.value = (price * qty).toFixed(2);
      } else {
        priceInput.value = '';
        totalInput.value = '';
      }
    }

    productSelect.addEventListener('change', updateProductPrices);
    qtyInput.addEventListener('input', () => {
      const price = Number(priceInput.value) || 0;
      const qty = Number(qtyInput.value) || 0;
      totalInput.value = (price * qty).toFixed(2);
    });

    if (products.length > 0) updateProductPrices();

    // ─── CART STATE ──────────────────────────────────────────────────────────
    const cart = [];

    function updateCartUI() {
      if (cart.length === 0) {
        cartTableBody.innerHTML = `
          <tr>
            <td colspan="5" class="text-center" style="color: var(--text-secondary); padding: 2rem;">
              Cart is empty — add items from the form on the left.
            </td>
          </tr>`;
        grandTotalVal.textContent = '₦0.00';
        return;
      }

      cartTableBody.innerHTML = cart.map((item, i) => `
        <tr>
          <td><strong>${item.name}</strong></td>
          <td class="text-right" style="color: var(--text-secondary);">₦${item.price.toFixed(2)}</td>
          <td class="text-center">
            <div style="display: inline-flex; align-items: center; justify-content: center;">
              <button type="button" class="btn-qty btn-qty-dec" data-index="${i}">−</button>
              <span class="qty-display">${item.qty}</span>
              <button type="button" class="btn-qty btn-qty-inc" data-index="${i}">+</button>
            </div>
          </td>
          <td class="text-right" style="font-weight: 700;">₦${item.subtotal.toFixed(2)}</td>
          <td class="text-center">
            <button type="button" class="btn-remove" data-index="${i}">✕</button>
          </td>
        </tr>
      `).join('');

      const total = cart.reduce((s, it) => s + it.subtotal, 0);
      grandTotalVal.textContent = `₦${total.toFixed(2)}`;
    }

    updateCartUI();

    // ─── ADD TO CART ──────────────────────────────────────────────────────────
    document.getElementById('add-to-cart').addEventListener('click', () => {
      const productId = productSelect.value;
      const product   = productMap[productId];
      const qty       = parseInt(qtyInput.value, 10);

      if (!productId || !product) { alert('Please select a product'); return; }
      if (qty < 1 || isNaN(qty))  { alert('Please enter a valid quantity'); return; }

      const price    = Number(priceInput.value) || 0;
      const subtotal = price * qty;

      // Merge duplicates
      const existing = cart.find(item => item.productId === productId);
      if (existing) {
        existing.qty     += qty;
        existing.subtotal = existing.price * existing.qty;
      } else {
        cart.push({ productId, name: product.ProductName, price, qty, subtotal });
      }

      updateCartUI();
      qtyInput.value  = '1';
      totalInput.value = price.toFixed(2);
    });

    // ─── CART TABLE ACTIONS (delegated) ──────────────────────────────────────
    cartTableBody.addEventListener('click', (e) => {
      const target = e.target;
      const index  = parseInt(target.getAttribute('data-index'), 10);
      if (isNaN(index)) return;

      if (target.classList.contains('btn-qty-dec')) {
        if (cart[index].qty > 1) {
          cart[index].qty--;
          cart[index].subtotal = cart[index].price * cart[index].qty;
        } else {
          cart.splice(index, 1);
        }
        updateCartUI();
      } else if (target.classList.contains('btn-qty-inc')) {
        cart[index].qty++;
        cart[index].subtotal = cart[index].price * cart[index].qty;
        updateCartUI();
      } else if (target.classList.contains('btn-remove')) {
        cart.splice(index, 1);
        updateCartUI();
      }
    });

    // ─── SALES HISTORY HELPERS ────────────────────────────────────────────────
    function getSalesHistory() {
      try {
        return JSON.parse(localStorage.getItem(SALES_HISTORY_KEY) || '[]');
      } catch { return []; }
    }

    function saveSaleRecord(record) {
      const history = getSalesHistory();
      history.unshift(record); // newest first
      localStorage.setItem(SALES_HISTORY_KEY, JSON.stringify(history));
    }


    // ─── PRINT RECEIPT (accepts a sale record object) ─────────────────────────
    function printReceiptFromRecord(sale) {
      const rows = sale.items.map(item => `
        <tr>
          <td>${item.name}</td>
          <td style="text-align:center;">${item.qty}</td>
          <td>₦${item.price.toFixed(2)}</td>
          <td>₦${item.subtotal.toFixed(2)}</td>
        </tr>
      `).join('');

      const printWindow = window.open('', '_blank', 'height=640,width=820');
      printWindow.document.write(`
        <html>
        <head>
          <title>Receipt — ${sale.receiptId}</title>
          <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
          <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { font-family: 'Outfit', sans-serif; padding: 28px; color: #222; background: #fff; }
            .header { text-align: center; margin-bottom: 18px; }
            .header h1 { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; }
            .header .subtitle { font-size: 0.85rem; color: #777; margin-top: 2px; }
            .divider { border: none; border-top: 2px dashed #ccc; margin: 14px 0; }
            .meta { font-size: 0.88rem; margin-bottom: 4px; color: #444; }
            .meta strong { color: #111; }
            table { width: 100%; border-collapse: collapse; margin-top: 14px; }
            th { background: #f0f4f8; padding: 9px 10px; text-align: left; font-size: 0.85rem; border-bottom: 1px solid #ddd; }
            td { padding: 8px 10px; font-size: 0.88rem; border-bottom: 1px solid #f0f0f0; }
            tbody tr:last-child td { border-bottom: none; }
            .total-row td { font-weight: 700; font-size: 1rem; padding-top: 12px; border-top: 2px dashed #ccc; }
            .footer { text-align: center; margin-top: 28px; font-size: 0.8rem; color: #888; }
            .receipt-id { font-size: 0.75rem; color: #aaa; text-align: center; margin-bottom: 6px; }
            @media print { body { padding: 12px; } }
          </style>
        </head>
        <body>
          <div class="header">
            <h1>StockSentinel</h1>
            <div class="subtitle">Official Sales Receipt</div>
          </div>
          <div class="receipt-id">Receipt #${sale.receiptId}</div>
          <hr class="divider">
          <p class="meta"><strong>Location:</strong> ${sale.locationName}</p>
          <p class="meta"><strong>Date:</strong> ${sale.dateTime}</p>
          <p class="meta"><strong>Seller:</strong> ${sale.sellerName || '—'}</p>
          ${sale.notes ? `<p class="meta"><strong>Notes:</strong> ${sale.notes}</p>` : ''}
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th style="text-align:center;">Qty</th>
                <th>Price</th>
                <th>Subtotal</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr class="total-row">
                <td colspan="3">Grand Total</td>
                <td>₦${sale.grandTotal.toFixed(2)}</td>
              </tr>
            </tbody>
          </table>
          <div class="footer">
            <p>Thank you for your purchase! 🙏</p>
            <p>Powered by StockSentinel</p>
          </div>
          <script>window.onload = () => window.print();<\/script>
        </body>
        </html>
      `);
      printWindow.document.close();
    }

    // ─── PRINT CURRENT CART ───────────────────────────────────────────────────
    function printCurrentCart() {
      if (cart.length === 0) { alert('Cart is empty'); return; }
      const locationName = locationSelect.options[locationSelect.selectedIndex]?.text || '—';
      const grandTotal   = cart.reduce((s, i) => s + i.subtotal, 0);
      const currentUser  = getCurrentUser() || { UserID: '302', FullName: 'John Doe' };
      printReceiptFromRecord({
        receiptId:    'PREVIEW',
        dateTime:     new Date().toLocaleString(),
        locationName,
        notes:        notesInput.value.trim(),
        items:        cart.map(i => ({ ...i })),
        grandTotal,
        sellerName:   currentUser.FullName || currentUser.UserID
      });
    }

    document.getElementById('print-receipt-btn').addEventListener('click', printCurrentCart);

    // Expose method to load a past sale back into the cart for editing
    window.loadSaleToCart = function(sale) {
      // Clear existing cart
      cart.length = 0;
      
      // Load items
      sale.items.forEach(item => {
        cart.push({
          productId: item.productId,
          name: item.name,
          price: Number(item.price),
          qty: Number(item.qty),
          subtotal: Number(item.subtotal)
        });
      });

      // Load location if matched
      if (sale.locationName) {
        const matchedOption = Array.from(locationSelect.options).find(opt => opt.text === sale.locationName);
        if (matchedOption) {
          locationSelect.value = matchedOption.value;
        }
      }

      // Load notes
      notesInput.value = sale.notes || '';

      // Refresh cart UI
      updateCartUI();
    };


    // ─── SAVE TRANSACTIONS ────────────────────────────────────────────────────
    async function saveCartTransactions() {
      const locationId  = locationSelect.value;
      const notes       = notesInput.value.trim();
      const currentUser = getCurrentUser() || { UserID: '302' };

      for (const item of cart) {
        await saveTransaction({
          ProductID:       item.productId,
          TransactionType: 'Outbound',
          Quantity:        item.qty,
          LocationID:      locationId,
          ReferenceNumber: 'SALE',
          Notes:           notes,
          UserID:          currentUser.UserID,
          TransactionDate: new Date().toISOString()
        });
      }
    }

    // ─── FINALIZE SALE ────────────────────────────────────────────────────────
    document.getElementById('finalize-sale').addEventListener('click', async () => {
      if (cart.length === 0) { alert('Cart is empty'); return; }

      const confirmed = confirm('Finalize this sale? Inventory will be deducted.');
      if (!confirmed) return;

      const finalizeBtn = document.getElementById('finalize-sale');
      finalizeBtn.disabled = true;
      finalizeBtn.textContent = '⏳ Saving...';

      try {
        await saveCartTransactions();

        const currentUser = getCurrentUser() || { UserID: '302', FullName: 'John Doe' };
        const locationName = locationSelect.options[locationSelect.selectedIndex]?.text || '—';
        const grandTotal   = cart.reduce((s, i) => s + i.subtotal, 0);
        const receiptId    = 'REC-' + Date.now();
        const saleRecord   = {
          receiptId,
          dateTime:    new Date().toLocaleString(),
          locationName,
          notes:       notesInput.value.trim(),
          items:       cart.map(i => ({ ...i })),
          grandTotal,
          sellerName:  currentUser.FullName || currentUser.UserID
        };

        // Save to history
        saveSaleRecord(saleRecord);

        // Print automatically
        printReceiptFromRecord(saleRecord);

        // Flash success and clear cart (stay on page)
        const cartPanel = document.getElementById('cart-panel');
        cartPanel.classList.add('finalize-flash');
        setTimeout(() => cartPanel.classList.remove('finalize-flash'), 1000);

        cart.length = 0;
        updateCartUI();
        notesInput.value = '';


      } catch (error) {
        console.error('Finalize sale error:', error);
        alert('Failed to record sale. Please try again.');
      } finally {
        finalizeBtn.disabled = false;
        finalizeBtn.textContent = '✅ Finalize Sale';
      }
    });

  </script>
</body>

</html>
